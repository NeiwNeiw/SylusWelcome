<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>秦徹影片</title>
  <style>
    :root{
      --bg1:#0b0b11;
      --bg2:#161623;
      --card:rgba(255,255,255,0.08);
      --line:rgba(255,255,255,0.10);
      --shadow:0 40px 120px rgba(0,0,0,.65);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
      background:
        radial-gradient(circle at top, rgba(120,120,180,.20), transparent 40%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    }

    body{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.05), transparent 40%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0));
      filter: blur(6px);
      transform: scale(1.05);
      z-index:0;
    }

    .wrap{
      position:relative;
      z-index:1;
      width:min(100%, 1080px);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .player-card{
      width:min(100%, 960px);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }

    .player-box{
      position:relative;
      width:100%;
      aspect-ratio:16 / 9;
      background:#000;
    }

    .player-box iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
    }

    @media (max-width: 768px){
      body{ padding:14px; }
      .player-card{ border-radius:18px; }
    }
  </style>
</head>
<body oncontextmenu="return false">
  <div class="bg"></div>

  <main class="wrap">
    <section class="player-card" aria-label="影片播放器">
      <div class="player-box">
        <iframe
          src="https://drive.google.com/file/d/1NpRL96Jp71oaIfOtYNNoQb0pQhnZtA_g/preview"
          allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin"
          title="秦徹影片"
        ></iframe>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("keydown", e => {
      if (
        (e.ctrlKey && ["s","u","p"].includes(e.key.toLowerCase())) ||
        e.key === "F12"
      ) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
