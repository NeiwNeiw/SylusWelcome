<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>秦徹｜回顧影片</title>
  <meta name="theme-color" content="#0b0b11" />
  <style>
    :root{
      --bg1:#050507;
      --bg2:#0d0e16;
      --bg3:#1b1d2b;
      --text:#f4f1ea;
      --muted:rgba(244,241,234,.72);
      --line:rgba(255,255,255,.10);
      --card:rgba(255,255,255,.06);
      --shadow:0 40px 120px rgba(0,0,0,.62);
      --gold:rgba(220,188,128,.72);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 18%, rgba(210,180,120,.14), transparent 25%),
        radial-gradient(circle at 20% 30%, rgba(130,140,255,.10), transparent 28%),
        linear-gradient(180deg, var(--bg3) 0%, var(--bg2) 42%, var(--bg1) 100%);
      overflow-x:hidden;
    }

    body{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 20px;
    }

    .bg,
    .vignette,
    .grain{
      position:fixed;
      inset:0;
      pointer-events:none;
    }

    .bg{
      background:
        radial-gradient(circle at center, rgba(255,255,255,.07), transparent 42%),
        radial-gradient(circle at 80% 10%, rgba(255,220,160,.08), transparent 18%),
        radial-gradient(circle at 20% 90%, rgba(120,125,255,.08), transparent 20%);
      filter:blur(18px);
      transform:scale(1.08);
      animation:bgFloat 16s ease-in-out infinite alternate;
      z-index:0;
    }

    .vignette{
      background:radial-gradient(circle at center, transparent 45%, rgba(0,0,0,.42) 100%);
      z-index:1;
    }

    .grain{
      opacity:.06;
      z-index:2;
      background-image:
        linear-gradient(rgba(255,255,255,.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.12) 1px, transparent 1px);
      background-size:3px 3px, 4px 4px;
      mix-blend-mode:soft-light;
    }

    .wrap{
      position:relative;
      z-index:3;
      width:min(100%, 1180px);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .player-card{
      position:relative;
      width:min(100%, 1020px);
      border:1px solid var(--line);
      border-radius:30px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        var(--card);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .header{
      position:absolute;
      inset:0 0 auto 0;
      z-index:4;
      padding:28px 28px 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,0));
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-size:12px;
      letter-spacing:.34em;
      text-transform:uppercase;
      color:var(--gold);
    }

    .eyebrow::before,
    .eyebrow::after{
      content:"";
      display:block;
      width:34px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(220,188,128,.8), transparent);
    }

    .title{
      margin:0;
      font-size:clamp(24px, 4vw, 40px);
      letter-spacing:.08em;
      font-weight:700;
      text-shadow:0 8px 30px rgba(0,0,0,.45);
    }

    .subtitle{
      margin:0;
      max-width:720px;
      color:var(--muted);
      font-size:clamp(13px, 2vw, 16px);
      line-height:1.8;
      text-shadow:0 4px 18px rgba(0,0,0,.45);
    }

    .player-box{
      position:relative;
      width:100%;
      aspect-ratio:16 / 9;
      background:#000;
      overflow:hidden;
    }

    .player-box iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
    }

    .player-box::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(0,0,0,.28), rgba(0,0,0,0) 26%, rgba(0,0,0,0) 72%, rgba(0,0,0,.35)),
        radial-gradient(circle at center, transparent 58%, rgba(0,0,0,.22));
    }

    .footer-note{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      padding:16px 20px 20px;
      color:rgba(244,241,234,.62);
      font-size:13px;
      letter-spacing:.08em;
      text-align:center;
      background:linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.02));
    }

    .footer-note .dot{
      width:4px;
      height:4px;
      border-radius:50%;
      background:rgba(220,188,128,.75);
      box-shadow:0 0 10px rgba(220,188,128,.8);
      flex:none;
    }

    @keyframes bgFloat{
      from{ transform:scale(1.08) translateY(-8px); filter:blur(18px) brightness(.96); }
      to{ transform:scale(1.12) translateY(8px); filter:blur(24px) brightness(1.08); }
    }

    @media (max-width: 900px){
      body{ padding:20px 12px; }
      .player-card{ border-radius:22px; }
      .header{ padding:20px 18px 10px; gap:8px; }
      .footer-note{ padding:14px 14px 16px; font-size:12px; letter-spacing:.05em; }
    }

    @media (max-width: 640px){
      .eyebrow::before,
      .eyebrow::after{ width:20px; }
      .subtitle{ line-height:1.65; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <main class="wrap">
    <section class="player-card" aria-label="影片播放器">
      <header class="header">
        <div class="eyebrow">Memory Film</div>
       
      </header>
		<div class="player-box">
		  <video 
			controls 
			controlsList="nodownload" 
			playsinline 
			preload="metadata"
			style="width:100%;height:100%;object-fit:cover;background:#000;"
		  >
			<source src="https://pub-62753a35875a41a1b3f3a3d82ce23a93.r2.dev/%E5%A4%9A%E9%81%A0%E9%83%BD%E8%A6%81%E5%9C%A8%E4%B8%80%E8%B5%B7.mp4" type="video/mp4">
			您的瀏覽器不支援影片播放
		  </video>
		</div>

      <div class="footer-note" aria-hidden="true">
        <span>獻給參加</span>
        <span class="dot"></span>
        <span>浮生徹語:靈魂相契 ✦ 秦徹生日茶會的小貍花們</span>
      </div>
    </section>
  </main>
</body>
</html>
