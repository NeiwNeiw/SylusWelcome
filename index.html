<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>秦徹影片</title>
  <style>
    :root{
      --bg1:#0f0f14;
      --bg2:#1a1a24;
      --card:rgba(255,255,255,0.08);
      --line:rgba(255,255,255,0.12);
      --shadow:0 20px 60px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
      background:
        radial-gradient(circle at top, rgba(120,120,180,.18), transparent 35%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      color:#fff;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:min(100%, 1100px);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .player-card{
      width:min(100%, 920px);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .player-box{
      position:relative;
      width:100%;
      aspect-ratio:16 / 9;
      background:#000;
    }

    .player-box iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
    }

    @media (max-width: 768px){
      body{ padding:14px; }
      .player-card{ border-radius:16px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="player-card" aria-label="影片播放器">
      <div class="player-box">
        <!--
          把下面 FILE_ID 換成你的 Google 雲端影片檔案 ID
          例如：
          https://drive.google.com/file/d/1AbCdEfGhIjKlMnOpQrStUvWxYz/view?usp=sharing
          那 FILE_ID 就是：
          1AbCdEfGhIjKlMnOpQrStUvWxYz
        -->
        <iframe
          src="https://drive.google.com/file/d/1NpRL96Jp71oaIfOtYNNoQb0pQhnZtA_g/preview"
          allow="autoplay; fullscreen"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin"
          title="秦徹影片"
        ></iframe>
      </div>
    </section>
  </main>
</body>
</html>
